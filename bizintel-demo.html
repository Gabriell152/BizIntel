<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — BizIntel Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #070C1A;
    --bg-card:    #0E1829;
    --accent:     #3B82F6;
    --accent2:    #06B6D4;
    --accent3:    #8B5CF6;
    --success:    #10B981;
    --danger:     #EF4444;
    --text:       #F1F5F9;
    --muted:      #94A3B8;
    --border:     rgba(59,130,246,0.18);
    --glow:       0 0 40px rgba(59,130,246,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.06) 0%, transparent 70%);
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 64px;
    background: rgba(7,12,26,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em;
    text-decoration: none; color: var(--text);
  }
  .nav-logo .dot {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 900; color: #fff;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 5% 60px;
    text-align: center;
  }

  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--glow);
  }

  .login-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .login-logo .dot {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 900; color: #fff;
  }

  .login-card h1 {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .login-card .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .form-group {
    text-align: left;
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input::placeholder {
    color: rgba(148,163,184,0.5);
  }

  .form-group input:focus {
    border-color: var(--accent);
  }

  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #2563EB);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(59,130,246,0.3);
    margin-top: 6px;
  }

  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 32px rgba(59,130,246,0.45);
  }

  .register-msg {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .register-msg a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .register-msg a:hover {
    color: var(--accent2);
  }

  .back-link {
    margin-top: 24px;
    color: var(--muted);
    font-size: 0.82rem;
    text-decoration: none;
    transition: color 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .back-link:hover { color: var(--accent); }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--danger);
    margin-bottom: 18px;
    display: none;
  }

  @media (max-width: 768px) {
    .login-card { padding: 28px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="bizintel-landing.html" class="nav-logo">
    <div class="dot">BI</div>
    BizIntel Pro
  </a>
</nav>

<main>
  <div class="login-card">
    <div class="login-logo">
      <div class="dot">BI</div>
      BizIntel Pro
    </div>

    <h1>Iniciar Sesión</h1>
    <p class="subtitle">Accede al panel de inteligencia de negocios</p>

    <div class="error-msg" id="error-msg">
      Credenciales incorrectas. Si no tienes cuenta, contacta al desarrollador.
    </div>

    <form id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Entrar al Dashboard</button>
    </form>

    <div class="register-msg">
      ¿No tienes una cuenta?<br>
      Para registrarte, contacta al desarrollador
    </div>
  </div>

  <a href="bizintel-landing.html" class="back-link">← Volver a la página principal</a>
</main>

<script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  });
</script>

</body>
</html>
